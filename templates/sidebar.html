<!-- Jinja2 macro for shared sidebar — included in each page template -->
{% macro sidebar(username, active) %}
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-mark">PQ</div>
    <div>
      <div class="sidebar-logo-text">ProfitIQ</div>
      <div class="sidebar-logo-sub">Intelligence Suite</div>
    </div>
  </div>

  <div class="nav-label">Menu</div>

  <a href="/dashboard" class="nav-link {% if active=='dashboard' %}active{% endif %}">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
      <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
    </svg>
    Dashboard
  </a>

  <a href="/products" class="nav-link {% if active=='products' %}active{% endif %}">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
    </svg>
    Products
  </a>

  <a href="/reports" class="nav-link {% if active=='reports' %}active{% endif %}">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
      <polyline points="10 9 9 9 8 9"/>
    </svg>
    Reports
  </a>

  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="user-avatar">{{ username[0].upper() }}</div>
      <div class="user-name">{{ username }}</div>
    </div>
    <a href="/logout" class="logout-btn">Sign out</a>
  </div>
</aside>
{% endmacro %}
